name: workanow
description: "WorkaNow - Smart Clock-In & Payroll Management App"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  go_router: ^16.1.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.71.0
  google_fonts: ^6.3.0
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.5.0
  intl: ^0.20.2
  uuid: ^4.5.3
  equatable: ^2.0.8
  http: ^1.6.0
  percent_indicator: ^4.2.5
  timeline_tile: ^2.0.0
  table_calendar: ^3.2.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
